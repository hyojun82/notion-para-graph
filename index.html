<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PARA 노트 그래프</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0d0d0d; color: #ccc; font-family: 'Segoe UI', sans-serif; overflow: hidden; width: 100vw; height: 100vh; }
    svg { width: 100%; height: 100%; cursor: grab; }
    svg:active { cursor: grabbing; }

    .link { stroke-opacity: 0.5; fill: none; }
    .link.area-project { stroke: #7ecb20; stroke-width: 2; stroke-dasharray: 5,3; }
    .link.area-note    { stroke: #555; stroke-width: 1.2; }
    .link.project-note { stroke: #ff8c42; stroke-width: 1.2; stroke-opacity: 0.4; }
    .link.highlighted  { stroke-opacity: 1 !important; stroke-width: 2.5 !important; }

    .node { cursor: pointer; }
    .node circle, .node rect { transition: filter 0.2s; }
    .node:hover circle, .node:hover rect { filter: brightness(1.5) drop-shadow(0 0 8px currentColor); }
    .node-label { fill: #ccc; font-size: 10.5px; text-anchor: middle; pointer-events: none; user-select: none; }
    .node-label.big { font-size: 12px; font-weight: 600; fill: #eee; }

    /* Tooltip */
    #tooltip {
      position: absolute; background: rgba(18,18,28,0.97);
      border: 1px solid #333; border-radius: 8px; padding: 10px 14px;
      font-size: 12px; color: #ddd; pointer-events: none; opacity: 0;
      transition: opacity 0.15s; max-width: 220px; z-index: 20; line-height: 1.6;
    }
    #tooltip strong { color: #fff; font-size: 13px; }
    #tooltip .badge { display: inline-block; padding: 1px 7px; border-radius: 10px; font-size: 10px; margin-top: 4px; }

    /* Controls */
    #controls { position: absolute; bottom: 16px; right: 16px; display: flex; flex-direction: column; gap: 6px; z-index: 20; }
    .ctrl-btn { width: 32px; height: 32px; background: rgba(35,35,48,0.95); border: 1px solid #3a3a50; border-radius: 6px; color: #bbb; font-size: 16px; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .ctrl-btn:hover { background: rgba(70,70,100,0.95); color: #fff; }

    /* Legend */
    #legend { position: absolute; top: 14px; left: 14px; background: rgba(15,15,25,0.92); border: 1px solid #2a2a3a; border-radius: 10px; padding: 12px 16px; font-size: 11px; color: #999; z-index: 20; min-width: 140px; }
    #legend h3 { font-size: 12px; color: #eee; margin-bottom: 10px; font-weight: 600; letter-spacing: 0.5px; }
    .leg { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; cursor: pointer; transition: opacity 0.2s; }
    .leg.dimmed { opacity: 0.35; }
    .leg-dot { width: 11px; height: 11px; border-radius: 50%; flex-shrink: 0; }
    .leg-sq  { width: 11px; height: 11px; border-radius: 2px; flex-shrink: 0; }
    .leg-dia { width: 11px; height: 11px; transform: rotate(45deg); flex-shrink: 0; }

    /* Search */
    #search-box { position: absolute; top: 14px; right: 14px; z-index: 20; }
    #search-input { background: rgba(18,18,28,0.95); border: 1px solid #333; border-radius: 8px; color: #eee; padding: 7px 12px; font-size: 12px; outline: none; width: 175px; }
    #search-input:focus { border-color: #4a9eff; }
    #search-input::placeholder { color: #444; }

    /* Stats */
    #stats { position: absolute; bottom: 14px; left: 14px; font-size: 10px; color: #444; z-index: 20; line-height: 1.8; }

    /* Click hint */
    #hint { position: absolute; bottom: 28px; left: 50%; transform: translateX(-50%); font-size: 10px; color: #333; z-index: 20; white-space: nowrap; }

    /* Live indicator */
    #live-bar {
      display: flex; align-items: center; gap: 6px;
      margin-top: 8px; padding-top: 8px; border-top: 1px solid #222;
    }
    #live-dot {
      width: 7px; height: 7px; border-radius: 50%;
      background: #4caf50; flex-shrink: 0;
    }
    #live-dot.pulse { animation: pulse 1.8s ease-in-out infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(76,175,80,0.6); }
      50% { opacity: 0.8; box-shadow: 0 0 0 4px rgba(76,175,80,0); }
    }
    #live-label { font-size: 10px; color: #666; }
    #last-updated { font-size: 9px; color: #3a3a4a; margin-top: 2px; }
  </style>
</head>
<body>
<svg id="svg"></svg>
<div id="tooltip"></div>

<div id="legend">
  <h3>📊 PARA 그래프</h3>
  <div class="leg" data-type="area">
    <div class="leg-dot" style="background:#4a9eff;box-shadow:0 0 5px #4a9eff44"></div><span>영역 (Area)</span>
  </div>
  <div class="leg" data-type="resource">
    <div class="leg-dot" style="background:#b06fff;box-shadow:0 0 5px #b06fff44"></div><span>자원 (Resource)</span>
  </div>
  <div class="leg" data-type="project">
    <div class="leg-sq" style="background:#ff8c42;box-shadow:0 0 5px #ff8c4244"></div><span>프로젝트</span>
  </div>
  <div class="leg" data-type="note">
    <div class="leg-dot" style="background:#4ecdc4;box-shadow:0 0 4px #4ecdc444"></div><span>노트</span>
  </div>
  <div style="border-top:1px solid #222;margin:8px 0"></div>
  <div style="font-size:10px;color:#555">크기 = 연결 노트 수</div>
  <div id="live-bar">
    <div id="live-dot" class="pulse"></div>
    <span id="live-label">연결 중...</span>
  </div>
  <div id="last-updated"></div>
</div>

<div id="search-box">
  <input id="search-input" type="text" placeholder="🔍 노드 검색..." />
</div>

<div id="controls">
  <div class="ctrl-btn" id="refresh-btn" title="지금 갱신">↺</div>
  <div class="ctrl-btn" id="zoom-in">+</div>
  <div class="ctrl-btn" id="zoom-out">−</div>
  <div class="ctrl-btn" id="zoom-reset">⊙</div>
</div>

<div id="stats"></div>
<div id="hint">클릭하면 노션 페이지로 이동</div>

<script>
const REFRESH_INTERVAL = 30000; // 30초마다 갱신

// ═══════════════════════════════════════════════
//  스타일 헬퍼
// ═══════════════════════════════════════════════
function nodeColor(d) {
  if (d.type === "area")     return "#4a9eff";
  if (d.type === "resource") return "#b06fff";
  if (d.type === "project") {
    if (d.status === "진행 중") return "#ff8c42";
    if (d.status === "완료")    return "#888";
    return "#ffd166";
  }
  return "#4ecdc4";
}
function nodeRadius(d) {
  if (d.type === "note") return 7;
  const base = d.type === "project" ? 12 : 10;
  return base + Math.sqrt(d.noteCount || 0) * 1.4;
}
function isHub(d) { return d.type !== "note"; }

// ═══════════════════════════════════════════════
//  SVG 초기화
// ═══════════════════════════════════════════════
const container = document.body;
let W = container.clientWidth, H = container.clientHeight;
const svg = d3.select("#svg");

const zoom = d3.zoom().scaleExtent([0.15, 6]).on("zoom", e => g.attr("transform", e.transform));
svg.call(zoom);

const g     = svg.append("g");
const gLink = g.append("g");
const gNode = g.append("g");

// ═══════════════════════════════════════════════
//  Simulation (데이터 없이 먼저 생성)
// ═══════════════════════════════════════════════
const sim = d3.forceSimulation()
  .force("link", d3.forceLink().id(d => d.id).distance(d => {
    if (d.type === "area-project") return 120;
    if (d.type === "area-note")    return 90;
    return 80;
  }).strength(0.4))
  .force("charge", d3.forceManyBody().strength(d => isHub(d) ? -350 : -80))
  .force("center", d3.forceCenter(W/2, H/2))
  .force("collision", d3.forceCollide(d => nodeRadius(d) + 12));

// tick에서 참조할 현재 선택 변수
let linkSel = gLink.selectAll("line");
let nodeSel = gNode.selectAll(".node");

const tooltip   = document.getElementById("tooltip");
const badgeColor = { area:"#4a9eff", resource:"#b06fff", project:"#ff8c42", note:"#4ecdc4" };
const typeName   = { area:"영역", resource:"자원", project:"프로젝트", note:"노트" };

// ─── tick ───
sim.on("tick", () => {
  linkSel
    .attr("x1", d => d.source.x).attr("y1", d => d.source.y)
    .attr("x2", d => d.target.x).attr("y2", d => d.target.y);
  nodeSel.attr("transform", d => `translate(${d.x},${d.y})`);
});

// ─── 노드 이벤트 바인딩 ───
function attachNodeEvents(sel) {
  sel
    .call(d3.drag()
      .on("start", (e,d) => { if (!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; })
      .on("drag",  (e,d) => { d.fx=e.x; d.fy=e.y; })
      .on("end",   (e,d) => { if (!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }))
    .on("click", (e,d) => { if (d.url) window.open(d.url, "_blank"); })
    .on("mouseover", function(ev, d) {
      linkSel.classed("highlighted", l => l.source.id===d.id || l.target.id===d.id);
      let html = `<strong>${d.id.replace("\n"," ")}</strong><br>`;
      html += `<span class="badge" style="background:${badgeColor[d.type]}22;color:${badgeColor[d.type]};border:1px solid ${badgeColor[d.type]}55">${typeName[d.type]}</span>`;
      if (d.status) html += ` <span class="badge" style="background:#ffffff11;color:#aaa;border:1px solid #333">${d.status}</span>`;
      if (d.noteCount) html += `<br><span style="color:#666;font-size:11px">연결 노트 ${d.noteCount}개</span>`;
      if (d.desc) html += `<br><span style="color:#555;font-size:10px">${d.desc}</span>`;
      html += `<br><span style="color:#333;font-size:10px">클릭 → 노션 열기</span>`;
      tooltip.innerHTML = html;
      tooltip.style.opacity = "1";
    })
    .on("mousemove", ev => {
      tooltip.style.left = (ev.clientX+14)+"px";
      tooltip.style.top  = (ev.clientY-10)+"px";
    })
    .on("mouseout", () => {
      linkSel.classed("highlighted", false);
      tooltip.style.opacity = "0";
    });
}

// ═══════════════════════════════════════════════
//  그래프 업데이트 (join 패턴 - 추가/삭제/변경 반영)
// ═══════════════════════════════════════════════
function updateGraph(data) {
  // 기존 노드의 위치 보존
  const posMap = new Map(sim.nodes().map(d => [d.id, d]));
  data.nodes.forEach(d => {
    const old = posMap.get(d.id);
    if (old) { d.x = old.x; d.y = old.y; d.vx = old.vx; d.vy = old.vy; }
  });

  sim.nodes(data.nodes);
  sim.force("link").links(data.links);

  // ─── Links join ───
  linkSel = gLink.selectAll("line")
    .data(data.links, d => {
      const s = typeof d.source === "object" ? d.source.id : d.source;
      const t = typeof d.target === "object" ? d.target.id : d.target;
      return `${s}__${t}`;
    })
    .join(
      enter  => enter.append("line").attr("class", d => `link ${d.type}`),
      update => update.attr("class", d => `link ${d.type}`),
      exit   => exit.remove()
    );

  // ─── Nodes join ───
  nodeSel = gNode.selectAll(".node")
    .data(data.nodes, d => d.id)
    .join(
      // 새 노드 진입
      enter => {
        const g = enter.append("g").attr("class", "node");
        g.each(function(d) {
          const el = d3.select(this);
          const r  = nodeRadius(d);
          const c  = nodeColor(d);
          if (d.type === "project") {
            const s = r * 1.7;
            el.append("rect")
              .attr("x", -s/2).attr("y", -s/2).attr("width", s).attr("height", s).attr("rx", 4)
              .style("fill", c).style("stroke", d3.color(c).darker(0.8)).style("stroke-width", 1.5)
              .style("filter", `drop-shadow(0 0 5px ${c}66)`);
          } else {
            el.append("circle").attr("r", r)
              .style("fill", c).style("stroke", d3.color(c).darker(0.8)).style("stroke-width", 1.5)
              .style("filter", `drop-shadow(0 0 ${isHub(d)?6:3}px ${c}55)`);
          }
        });
        g.append("text")
          .attr("class", d => isHub(d) ? "node-label big" : "node-label")
          .attr("dy", d => nodeRadius(d) + (isHub(d) ? 15 : 13))
          .each(function(d) {
            const lines = d.id.split("\n");
            const el = d3.select(this);
            if (lines.length > 1) {
              lines.forEach((line, i) => {
                el.append("tspan").attr("x", 0).attr("dy", i === 0 ? 0 : "1.1em").text(line);
              });
            } else {
              el.text(d.id);
            }
          });
        attachNodeEvents(g);
        return g;
      },
      // 기존 노드: 상태 변화 반영 (크기·색상 트랜지션)
      update => {
        update.each(function(d) {
          const el = d3.select(this);
          const r  = nodeRadius(d);
          const c  = nodeColor(d);
          if (d.type === "project") {
            const s = r * 1.7;
            el.select("rect").transition().duration(800)
              .attr("x", -s/2).attr("y", -s/2).attr("width", s).attr("height", s)
              .style("fill", c).style("stroke", d3.color(c).darker(0.8));
          } else {
            el.select("circle").transition().duration(800)
              .attr("r", r)
              .style("fill", c).style("stroke", d3.color(c).darker(0.8));
          }
          // 라벨 y 위치 업데이트
          el.select("text").attr("dy", nodeRadius(d) + (isHub(d) ? 15 : 13));
        });
        return update;
      },
      // 삭제된 노드 fade out
      exit => exit.transition().duration(400).style("opacity", 0).remove()
    );

  sim.alpha(0.3).restart();
  updateStats(data);
  applyHiddenTypes();
}

// ═══════════════════════════════════════════════
//  실시간 상태 UI
// ═══════════════════════════════════════════════
function setLiveStatus(status) {
  const dot   = document.getElementById("live-dot");
  const label = document.getElementById("live-label");
  if (status === "live") {
    dot.style.background = "#4caf50";
    dot.classList.add("pulse");
    label.textContent = "실시간";
    label.style.color = "#4caf50";
  } else if (status === "loading") {
    dot.style.background = "#ffd166";
    dot.classList.remove("pulse");
    label.textContent = "갱신 중...";
    label.style.color = "#ffd166";
  } else {
    dot.style.background = "#ff6b6b";
    dot.classList.remove("pulse");
    label.textContent = "연결 오류";
    label.style.color = "#ff6b6b";
  }
}

function setLastUpdated() {
  const now = new Date();
  const hh  = now.getHours().toString().padStart(2, "0");
  const mm  = now.getMinutes().toString().padStart(2, "0");
  const ss  = now.getSeconds().toString().padStart(2, "0");
  document.getElementById("last-updated").textContent = `${hh}:${mm}:${ss} 업데이트`;
}

function updateStats(data) {
  const counts = { area:0, resource:0, project:0, note:0 };
  data.nodes.forEach(d => counts[d.type]++);
  document.getElementById("stats").textContent =
    `영역 ${counts.area} · 자원 ${counts.resource} · 프로젝트 ${counts.project} · 노트 ${counts.note}개`;
}

// ═══════════════════════════════════════════════
//  데이터 fetch & 갱신
// ═══════════════════════════════════════════════
async function fetchAndUpdate() {
  setLiveStatus("loading");
  try {
    const res  = await fetch("data.json?t=" + Date.now());
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    const data = await res.json();
    updateGraph(data);
    setLiveStatus("live");
    setLastUpdated();
  } catch (err) {
    console.error("데이터 로드 실패:", err);
    setLiveStatus("error");
  }
}

// 초기 로드 + 자동 갱신
fetchAndUpdate();
setInterval(fetchAndUpdate, REFRESH_INTERVAL);

// ═══════════════════════════════════════════════
//  Controls
// ═══════════════════════════════════════════════
document.getElementById("refresh-btn").onclick = fetchAndUpdate;
document.getElementById("zoom-in").onclick     = () => svg.transition().call(zoom.scaleBy, 1.3);
document.getElementById("zoom-out").onclick    = () => svg.transition().call(zoom.scaleBy, 0.77);
document.getElementById("zoom-reset").onclick  = () =>
  svg.transition().call(zoom.transform, d3.zoomIdentity.translate(W/2, H/2).scale(1));

// ─── Search ───
document.getElementById("search-input").addEventListener("input", function() {
  const q = this.value.trim().toLowerCase();
  if (!q) {
    nodeSel.style("opacity", 1);
    linkSel.style("opacity", l => l.type === "area-project" ? 0.7 : 0.5);
    return;
  }
  nodeSel.style("opacity", d => d.id.toLowerCase().includes(q) ? 1 : 0.08);
  linkSel.style("opacity", l =>
    (l.source.id.toLowerCase().includes(q) || l.target.id.toLowerCase().includes(q)) ? 0.9 : 0.03);
  const all   = sim.nodes();
  const match = all.find(d => d.id.toLowerCase().includes(q));
  if (match?.x) svg.transition().duration(500).call(zoom.transform,
    d3.zoomIdentity.translate(W/2 - match.x, H/2 - match.y).scale(1.6));
});

// ─── Legend toggles ───
const hidden = new Set();
function applyHiddenTypes() {
  nodeSel.style("opacity", d => hidden.has(d.type) ? 0.05 : 1);
  linkSel.style("opacity", l => {
    const st = typeof l.source === "object" ? l.source.type : "";
    const tt = typeof l.target === "object" ? l.target.type : "";
    if (hidden.has(st) || hidden.has(tt)) return 0.03;
    return l.type === "area-project" ? 0.7 : 0.5;
  });
}

document.querySelectorAll(".leg[data-type]").forEach(el => {
  el.addEventListener("click", () => {
    const t = el.dataset.type;
    if (hidden.has(t)) { hidden.delete(t); el.classList.remove("dimmed"); }
    else               { hidden.add(t);    el.classList.add("dimmed"); }
    applyHiddenTypes();
  });
});

window.addEventListener("resize", () => {
  W = container.clientWidth; H = container.clientHeight;
  sim.force("center", d3.forceCenter(W/2, H/2)).restart();
});
</script>
</body>
</html>
